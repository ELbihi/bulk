<script>
  function transitionTo(stateId) {
    const states = ['state-email', 'state-code', 'state-syncing'];
    const emailInput = document.getElementById('email-input');
    const displayEmail = document.getElementById('display-email');
    const errorMsg = document.getElementById('error-msg');

    if (stateId === 'state-code' && emailInput.value) {
      displayEmail.innerText = emailInput.value.toUpperCase();
      // Clear error on transition
      errorMsg.classList.add('hidden-state');
    }

    states.forEach(id => {
      const el = document.getElementById(id);
      if (id === stateId) {
        el.classList.remove('hidden-state');
        el.classList.add('active-state');
      } else {
        el.classList.remove('active-state');
        el.classList.add('hidden-state');
      }
    });

    // Auto-focus first input when entering code state
    if (stateId === 'state-code') {
      setTimeout(() => {
        const inputs = document.querySelectorAll('#otp-container input');
        inputs[0].focus();
      }, 500);
    }
  }

  // OTP Input Logic
  const otpInputs = document.querySelectorAll('#otp-container input');
  otpInputs.forEach((input, index) => {
    input.addEventListener('input', (e) => {
      if (e.target.value.length === 1 && index < otpInputs.length - 1) {
        otpInputs[index + 1].focus();
      }
    });

    input.addEventListener('keydown', (e) => {
      if (e.key === 'Backspace' && !e.target.value && index > 0) {
        otpInputs[index - 1].focus();
      }
    });
  });

  // Demo: Show error for a moment
  document.querySelector('#state-code button[onclick*="syncing"]').addEventListener('click', (e) => {
    // This is just for the demo interaction flow
    // In a real app, transitionTo would be called after validation
  });

  // Simple countdown demo
  let seconds = 42;
  const countdownEl = document.getElementById('countdown');
  setInterval(() => {
    if (seconds > 0) {
      seconds--;
      countdownEl.innerText = `0:${seconds.toString().padStart(2, '0')}`;
    }
  }, 1000);
</script>
